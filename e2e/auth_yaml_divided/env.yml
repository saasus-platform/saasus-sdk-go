info:
  contact:
    name: Anti-Pattern
  description: Schema
  title: SaaSus Auth API Schema
  version: 1.0.0
  x-description-i18n:
    jpn: スキーマ
openapi: 3.0.0
paths:
  /envs:
    get:
      description: |
        Get registered environment information.
        Multiple environments can be defined, such as an environment for testing linkage, an environment for development, and an environment for actual operation.
      operationId: GetEnvs
      responses:
        "200":
          content:
            application/json:
              schema:
                description: env list
                properties:
                  envs:
                    items:
                      description: env info
                      properties:
                        display_name:
                          description: env display name
                          example: SaaSus dev
                          type: string
                          x-description-i18n:
                            jpn: 環境表示名
                        id:
                          example: 1
                          type: integer
                          x-go-type: uint64
                        name:
                          description: env name
                          example: saasus_dev
                          type: string
                          x-description-i18n:
                            jpn: 環境名
                      required:
                      - id
                      - name
                      title: Env Info
                      type: object
                      x-description-i18n:
                        jpn: 環境情報
                      x-title-i18n:
                        jpn: 環境情報
                    type: array
                required:
                - envs
                title: Env Info
                type: object
                x-description-i18n:
                  jpn: env一覧
                x-title-i18n:
                  jpn: 環境情報
          description: OK
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Get Env Info
      tags:
      - env
      x-description-i18n:
        jpn: |
          登録されている環境情報を取得します。
          連携のテストや開発用環境や実際の運用で利用する環境など複数の環境を定義することができます。
      x-summary-i18n:
        jpn: 環境情報一覧を取得
    post:
      description: |
        Create environment information.
        Multiple environments can be defined, such as an environment for testing linkage, an environment for development, and an environment for actual operation.
      operationId: CreateEnv
      requestBody:
        content:
          application/json:
            schema:
              description: env info
              properties:
                display_name:
                  description: env display name
                  example: SaaSus dev
                  type: string
                  x-description-i18n:
                    jpn: 環境表示名
                id:
                  example: 1
                  type: integer
                  x-go-type: uint64
                name:
                  description: env name
                  example: saasus_dev
                  type: string
                  x-description-i18n:
                    jpn: 環境名
              required:
              - id
              - name
              title: Env Info
              type: object
              x-description-i18n:
                jpn: 環境情報
              x-title-i18n:
                jpn: 環境情報
      responses:
        "201":
          content:
            application/json:
              schema:
                description: env info
                properties:
                  display_name:
                    description: env display name
                    example: SaaSus dev
                    type: string
                    x-description-i18n:
                      jpn: 環境表示名
                  id:
                    example: 1
                    type: integer
                    x-go-type: uint64
                  name:
                    description: env name
                    example: saasus_dev
                    type: string
                    x-description-i18n:
                      jpn: 環境名
                required:
                - id
                - name
                title: Env Info
                type: object
                x-description-i18n:
                  jpn: 環境情報
                x-title-i18n:
                  jpn: 環境情報
          description: Created
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Create Env Info
      tags:
      - env
      x-description-i18n:
        jpn: |
          環境情報を作成します。
          連携のテストや開発用環境や実際の運用で利用する環境など複数の環境を定義することができます。
      x-summary-i18n:
        jpn: 環境情報を作成
  /envs/{env_id}:
    delete:
      description: |
        Delete env info. Env with id 3 cannot be deleted.
      operationId: DeleteEnv
      parameters:
      - description: Env ID
        in: path
        name: env_id
        required: true
        schema:
          example: 1
          type: integer
          x-go-type: uint64
        x-description-i18n:
          jpn: 環境ID
      responses:
        "200":
          description: OK
        "404":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Delete Env Info
      tags:
      - env
      x-description-i18n:
        jpn: |
          環境情報を削除します。idが3の環境は削除できません。
      x-summary-i18n:
        jpn: 環境情報を削除
    get:
      description: |
        Get environment details.
      operationId: GetEnv
      parameters:
      - description: Env ID
        in: path
        name: env_id
        required: true
        schema:
          example: 1
          type: integer
          x-go-type: uint64
        x-description-i18n:
          jpn: 環境ID
      responses:
        "200":
          content:
            application/json:
              schema:
                description: env info
                properties:
                  display_name:
                    description: env display name
                    example: SaaSus dev
                    type: string
                    x-description-i18n:
                      jpn: 環境表示名
                  id:
                    example: 1
                    type: integer
                    x-go-type: uint64
                  name:
                    description: env name
                    example: saasus_dev
                    type: string
                    x-description-i18n:
                      jpn: 環境名
                required:
                - id
                - name
                title: Env Info
                type: object
                x-description-i18n:
                  jpn: 環境情報
                x-title-i18n:
                  jpn: 環境情報
          description: OK
        "404":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Get Env Details
      tags:
      - env
      x-description-i18n:
        jpn: |
          環境情報の詳細を取得します。
      x-summary-i18n:
        jpn: 環境情報を取得
    patch:
      description: |
        Update env info.
      operationId: UpdateEnv
      parameters:
      - description: Env ID
        in: path
        name: env_id
        required: true
        schema:
          example: 1
          type: integer
          x-go-type: uint64
        x-description-i18n:
          jpn: 環境ID
      requestBody:
        content:
          application/json:
            schema:
              properties:
                display_name:
                  description: env display name
                  example: SaaSus dev
                  type: string
                  x-description-i18n:
                    jpn: 環境表示名
                name:
                  description: env name
                  example: saasus_dev
                  type: string
                  x-description-i18n:
                    jpn: 環境名
              required:
              - name
              title: Environment Update Parameters
              type: object
              x-title-i18n:
                jpn: 環境の更新パラメータ
      responses:
        "200":
          description: OK
        "404":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Update Env Info
      tags:
      - env
      x-description-i18n:
        jpn: |
          環境情報を更新します。
      x-summary-i18n:
        jpn: 環境情報を更新
security:
- Bearer: []
