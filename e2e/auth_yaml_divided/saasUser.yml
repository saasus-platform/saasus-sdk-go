          ユーザーを新規登録します。登録されたメールアドレスに対して仮パスワードを送信します。
      x-summary-i18n:
        jpn: 新規登録
  /sign-up/resend:
    post:
      description: |
        Resend temporary password for the new registered user.
      operationId: ResendSignUpConfirmationEmail
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  description: Email Address
                  title: Email Address
                  type: string
                  x-description-i18n:
                    jpn: メールアドレス
                  x-title-i18n:
                    jpn: メールアドレス
              required:
              - email
              title: Resend Sign Up Confirmation Email Parameters
              type: object
              x-title-i18n:
