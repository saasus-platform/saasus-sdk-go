                code:
                  example: "123456"
                  title: Verification Code
                  type: string
                  x-title-i18n:
                    jpn: 検証コード
              required:
              - access_token
              - code
              title: Confirm External User Account Link Parameters
              type: object
              x-title-i18n:
                jpn: 外部アカウントのユーザー連携確認パラメータ
      responses:
        "200":
          description: OK
        "400":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Confirm External User Account Link
      tags:
      - saasUser
      x-description-i18n:
        jpn: |
          外部アカウントのユーザー連携確認のためにコードを検証します。
      x-summary-i18n:
        jpn: 外部アカウントのユーザーの連携確認
  /external-users/request:
    post:
      description: |
        Request to link an external account user.
        Get the email address of the user to be linked from the access token and send a verification code to that email address.
        The verification code is valid for 24 hours.
      operationId: RequestExternalUserLink
      requestBody:
        content:
          application/json:
            schema:
              properties:
                access_token:
                  title: Access Token
                  type: string
                  x-title-i18n:
                    jpn: アクセストークン
              required:
              - access_token
              title: Request External User Account Link Parameters
              type: object
              x-title-i18n:
                jpn: 外部アカウントのユーザー連携要求パラメータ
      responses:
        "200":
          description: OK
        "400":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Request External User Account Link
      tags:
      - saasUser
      x-description-i18n:
        jpn: |
          外部アカウントのユーザー連携を要求します。
          アクセストークンから連携するユーザーのメールアドレスを取得し、そのメールアドレスに対して検証コードを送信します。
          検証コードの有効期限は24時間です。
      x-summary-i18n:
        jpn: 外部アカウントのユーザー連携要求
