info:
  contact:
    name: Anti-Pattern
  description: Schema
  title: SaaSus Auth API Schema
  version: 1.0.0
  x-description-i18n:
    jpn: スキーマ
openapi: 3.0.0
paths:
  /aws-marketplace/link:
    patch:
      description: |
        Link an existing tenant with AWS Marketplace.
        If the Registration Token is not valid, an error is returned.
      operationId: LinkAwsMarketplace
      requestBody:
        content:
          application/json:
            schema:
              properties:
                access_token:
                  description: Access token
                  title: Access Token
                  type: string
                  x-description-i18n:
                    jpn: アクセストークン
                  x-title-i18n:
                    jpn: アクセストークン
                registration_token:
                  description: Registration Token
                  title: Registration Token
                  type: string
                  x-description-i18n:
                    jpn: 登録トークン
                  x-title-i18n:
                    jpn: 登録トークン
                tenant_id:
                  description: Tenant ID
                  title: Tenant ID
                  type: string
                  x-description-i18n:
                    jpn: テナントID
                  x-title-i18n:
                    jpn: テナントID
              required:
              - tenant_id
              - access_token
              - registration_token
              title: Confirm Sign Up with AWS Marketplace Parameters
              type: object
              x-title-i18n:
                jpn: AWS Marketplaceによるユーザー新規登録の確定パラメータ
      responses:
        "200":
          description: OK
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Link an existing tenant with AWS Marketplace
      tags:
      - saasUser
      x-description-i18n:
        jpn: |
          AWS Marketplaceと既存のテナントを連携します。
          Registration Tokenが有効でない場合はエラーを返却します。
      x-summary-i18n:
        jpn: AWS Marketplaceと既存のテナントの連携
  /aws-marketplace/sign-up:
    post:
      description: |
        Register a new user linked to AWS Marketplace. A temporary password will be sent to the registered email.
        If the Registration Token is not valid, an error is returned.
      operationId: SignUpWithAwsMarketplace
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  description: Email Address
                  title: Email Address
                  type: string
                  x-description-i18n:
                    jpn: メールアドレス
                  x-title-i18n:
                    jpn: メールアドレス
                registration_token:
                  description: Registration Token
                  title: Registration Token
                  type: string
                  x-description-i18n:
                    jpn: 登録トークン
                  x-title-i18n:
                    jpn: 登録トークン
              required:
              - email
              - registration_token
              title: Sign Up with AWS Marketplace Parameters
              type: object
              x-title-i18n:
                jpn: AWS Marketplaceによるユーザー新規登録パラメータ
      responses:
        "201":
          content:
            application/json:
              schema:
                properties:
                  attributes:
                    additionalProperties: true
                    description: |
                      Attribute information
                    example:
                      address: 東京都
                      birthday: 19940925
                      sex: 男
                    type: object
                    x-description-i18n:
                      jpn: |
                        属性情報
                  email:
                    description: E-mail
                    example: hoge@example.com
                    type: string
                    x-description-i18n:
                      jpn: メールアドレス
                  id:
                    example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
                    type: string
                required:
                - id
                - email
                - attributes
                title: SaaS User
                type: object
                x-title-i18n:
                  jpn: SaaSユーザー
          description: OK
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Sign Up with AWS Marketplace
      tags:
      - saasUser
      x-description-i18n:
        jpn: |
          AWS Marketplaceと連携したユーザーを新規登録します。登録されたメールアドレスに対して仮パスワードを送信します。
          Registration Tokenが有効でない場合はエラーを返却します。
      x-summary-i18n:
        jpn: AWS Marketplaceによるユーザー新規登録
  /aws-marketplace/sign-up-confirm:
    post:
      description: |
        Confirm a new use registeration linked to AWS Marketplace. Create a new tenant linked to AWS Marketplace.
        If the Registration Token is not valid, an error is returned.
      operationId: ConfirmSignUpWithAwsMarketplace
      requestBody:
        content:
          application/json:
            schema:
              properties:
                access_token:
                  description: Access token
                  title: Access Token
                  type: string
                  x-description-i18n:
                    jpn: アクセストークン
                  x-title-i18n:
                    jpn: アクセストークン
                registration_token:
                  description: Registration Token
                  title: Registration Token
                  type: string
                  x-description-i18n:
                    jpn: 登録トークン
                  x-title-i18n:
                    jpn: 登録トークン
                tenant_name:
                  description: Tenant name
                  title: Tenant Name
                  type: string
                  x-description-i18n:
                    jpn: テナント名
                  x-title-i18n:
                    jpn: テナント名
              required:
              - access_token
              - registration_token
              title: Confirm Sign Up with AWS Marketplace Parameters
              type: object
              x-title-i18n:
                jpn: AWS Marketplaceによるユーザー新規登録の確定パラメータ
      responses:
        "201":
          content:
            application/json:
              schema:
                allOf:
                - properties:
                    billing_info:
                      properties:
                        address:
                          properties:
                            additional_address_info:
                              description: Additional information about the address,
                                such as a building name, floor, or department name.
                              example: オフィスビル3階
                              type: string
                              x-description-i18n:
                                jpn: 建物名・部屋番号などの住所に関する追加情報
                            city:
                              description: City, district, suburb, town, or village.
                              example: 渋谷区
                              type: string
                              x-description-i18n:
                                jpn: 住所の市区町村
                            country:
                              description: Country of the address using ISO 3166-1
                                alpha-2 code.
                              example: JP
                              pattern: ^[A-Z]{2}$
                              type: string
                              x-description-i18n:
                                jpn: 住所の国を ISO 3166-1 alpha-2 コードで指定します。
                            postal_code:
                              description: ZIP or postal code.
                              example: 123-4567
                              type: string
                              x-description-i18n:
                                jpn: 郵便番号
                            state:
                              description: State name or abbreviation.
                              example: 東京都
                              type: string
                              x-description-i18n:
                                jpn: 住所の都道府県または州
                            street:
                              description: Street address, apartment or suite number.
                              example: 神宮前1-1-1
                              type: string
                              x-description-i18n:
                                jpn: 住所の通りの名前や番地を含めた部分
                          required:
                          - street
                          - city
                          - state
                          - country
                          - postal_code
                          title: Tenant Billing Address
                          x-title-i18n:
                            jpn: テナントの請求先住所
                        invoice_language:
                          description: Language of invoice
                          enum:
                          - ja-JP
                          - en-US
                          type: string
                          x-description-i18n:
                            jpn: 請求書の言語
                        name:
                          description: Tenant name for billing
                          example: 株式会社テストテナント
                          type: string
                          x-description-i18n:
                            jpn: 請求用のテナント名
                      required:
                      - name
                      - address
                      - invoice_language
                      title: Tenant Billing Info
                      type: object
                      x-title-i18n:
                        jpn: テナント請求情報
                    id:
                      example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
                      type: string
                    plan_id:
                      example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
                      type: string
                  required:
                  - id
                - properties:
                    attributes:
                      additionalProperties: true
                      description: attribute info
                      example:
                        address: 東京都
                        employee_number: 100
                      type: object
                      x-description-i18n:
                        jpn: 属性情報
                    back_office_staff_email:
                      description: administrative staff email address
                      example: hoge@example.com
                      type: string
                      x-description-i18n:
                        jpn: 事務管理部門スタッフメールアドレス
                    name:
                      description: tenant name
                      example: Anti-Pattern Inc.
                      type: string
                      x-description-i18n:
                        jpn: テナント名
                  required:
                  - name
                  - attributes
                  - back_office_staff_email
                  type: object
                - properties:
                    delete_usage:
                      description: |
                        If you have a stripe linkage,  you can set whether to delete pay-as-you-go items when changing plans.
                        When you change plan, you can remove all pay-as-you-go items included in your current subscription to stop being billed based on pay-as-you-go items.
                        The recorded usage is cleared immediately. Since it cannot be restored, please note that plan change reservations with delete_usage set to true cannot be canceled.
                      title: Proration Behavior When Changing Plans
                      type: boolean
                      x-description-i18n:
                        jpn: |
                          stripe連携している場合で、プラン変更時に従量課金アイテムを削除するか設定できます。
                          プラン変更した場合に、現在のサブスクリプションに含まれる従量課金アイテムを全て削除して、従量課金アイテムに基づく請求の発生を止めることができます。
                          即時に記録している使用量がクリアされます。それらは復元できないため、delete_usageをtrueにしたプラン変更予約は取り消しできません。
                      x-title-i18n:
                        jpn: プラン変更時の従量課金アイテムの削除
                    next_plan_id:
                      example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
                      type: string
                    next_plan_tax_rate_id:
                      example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
                      type: string
                    proration_behavior:
                      description: |
                        If you have a strine linkage, you can set the behavior of the proportional allocation when changing plans.
                        When a plan is changed, you can set whether to prorate the billing amount and reflect it on the next invoice, to issue a prorated invoice immediately, or not to prorate at all.
                      enum:
                      - create_prorations
                      - none
                      - always_invoice
                      title: Proration Behavior When Changing Plans
                      type: string
                      x-description-i18n:
                        jpn: |
                          stripe連携している場合で、プラン変更時の比例配分の挙動を設定できます。
                          プラン変更した場合に、請求金額を日割り計算し次回請求書に反映させるか、日割り計算した請求を即時に発行する、日割り計算をしないを設定できます。
                      x-title-i18n:
                        jpn: プラン変更時の比例配分の挙動
                    using_next_plan_from:
                      description: |
                        Next billing plan start time (When using stripe, you can create a subscription that starts at the beginning of the current month by specifying 00:00 (UTC) at the beginning of the current month. Ex. 1672531200 for January 2023.)
                      example: 1640995200
                      type: integer
                      x-description-i18n:
                        jpn: |
                          次回料金プラン開始日時（stripe連携時、当月月初の0時（UTC）を指定すると当月月初開始のサブスクリプションを作成できます。ex. 2023年1月の場合は、1672531200 ）
                  title: Tenant Plan Reservation Information
                  type: object
                  x-title-i18n:
                    jpn: テナントのプラン予約情報
                - properties:
                    plan_histories:
                      description: Plan History
                      items:
                        properties:
                          delete_usage:
                            description: |
                              If you have a stripe linkage,  you can set whether to delete pay-as-you-go items when changing plans.
                              When you change plan, you can remove all pay-as-you-go items included in your current subscription to stop being billed based on pay-as-you-go items.
                              The recorded usage is cleared immediately. Since it cannot be restored, please note that plan change reservations with delete_usage set to true cannot be canceled.
                            title: Proration Behavior When Changing Plans
                            type: boolean
                            x-description-i18n:
                              jpn: |
                                stripe連携している場合で、プラン変更時に従量課金アイテムを削除するか設定できます。
                                プラン変更した場合に、現在のサブスクリプションに含まれる従量課金アイテムを全て削除して、従量課金アイテムに基づく請求の発生を止めることができます。
                                即時に記録している使用量がクリアされます。それらは復元できないため、delete_usageをtrueにしたプラン変更予約は取り消しできません。
                            x-title-i18n:
                              jpn: プラン変更時の従量課金アイテムの削除
                          plan_applied_at:
                            description: Registration date
                            example: 1640995200
                            type: integer
                            x-description-i18n:
                              jpn: 登録日時
                          plan_id:
                            example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
                            type: string
                          proration_behavior:
                            description: |
                              If you have a strine linkage, you can set the behavior of the proportional allocation when changing plans.
                              When a plan is changed, you can set whether to prorate the billing amount and reflect it on the next invoice, to issue a prorated invoice immediately, or not to prorate at all.
                            enum:
                            - create_prorations
                            - none
                            - always_invoice
                            title: Proration Behavior When Changing Plans
                            type: string
                            x-description-i18n:
                              jpn: |
                                stripe連携している場合で、プラン変更時の比例配分の挙動を設定できます。
                                プラン変更した場合に、請求金額を日割り計算し次回請求書に反映させるか、日割り計算した請求を即時に発行する、日割り計算をしないを設定できます。
                            x-title-i18n:
                              jpn: プラン変更時の比例配分の挙動
                          tax_rate_id:
                            example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
                            type: string
                        required:
                        - plan_id
                        - plan_applied_at
                        type: object
                      type: array
                      x-description-i18n:
                        jpn: 料金プラン履歴
                  required:
                  - plan_histories
                  type: object
                title: Tenants
                type: object
                x-title-i18n:
                  jpn: テナント情報
          description: Created
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Confirm Sign Up with AWS Marketplace
      tags:
      - saasUser
      x-description-i18n:
        jpn: |
          AWS Marketplaceと連携したユーザー新規登録を確定します。AWS Marketplaceと連携したテナントを新規作成します。
          Registration Tokenが有効でない場合はエラーを返却します。
      x-summary-i18n:
        jpn: AWS Marketplaceによるユーザー新規登録の確定
  /external-users/confirm:
