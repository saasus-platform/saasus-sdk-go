info:
  contact:
    name: Anti-Pattern
  description: Schema
  title: SaaSus Auth API Schema
  version: 1.0.0
  x-description-i18n:
    jpn: スキーマ
openapi: 3.0.0
paths:
  /plans/reset:
    put:
      description: |
        Delete all information related to rate plans.
        Delete plans linked to tenants and plan definitions.
        If you are using the Stripe linkage, the linkage will be removed.
      operationId: ResetPlan
      responses:
        "200":
          description: OK
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Delete all information related to rate plans
      tags:
      - tenant
      x-description-i18n:
        jpn: |
          料金プランに関わる情報を全削除します。
          テナントに連携されたプランとプラン定義を削除します。
          Stripe連携している場合、連携が解除されます。
      x-summary-i18n:
        jpn: プランに関わる情報を全削除
  /stripe:
    delete:
      description: |
        Delete customer and product from Stripe.
      operationId: DeleteStripeTenantAndPricing
      responses:
        "200":
          description: OK
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Delete Customer and Product From Stripe
      tags:
      - tenant
      x-description-i18n:
        jpn: |
          stripe上の顧客情報・商品情報を削除します
      x-summary-i18n:
        jpn: stripe上の顧客情報・商品情報の削除
  /stripe/init:
    patch:
      description: |
        Set Stripe initial information via billing
      operationId: CreateTenantAndPricing
      responses:
        "200":
          description: OK
        "500":
          content:
            application/json:
              schema:
                properties:
                  data:
                    additionalProperties: true
                    example:
                      sign_in_page_url: auth.dev.saasus.io
                    type: object
                  message:
                    description: Error message
                    type: string
                  type:
                    description: permission_denied
                    type: string
                required:
                - type
                - message
          description: Internal Server Error
      summary: Stripe Initial Setting
      tags:
      - tenant
      x-description-i18n:
        jpn: |
          billing経由でstripeへ初期情報を設定
      x-summary-i18n:
        jpn: stripe初期設定
  /tenants:
    get:
      description: |
        Get tenants managed by SaaSus Platform.
      operationId: GetTenants
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Tenant Info
                properties:
                  tenants:
                    items:
                      allOf:
                      - properties:
                          billing_info:
                            properties:
                              address:
                                properties:
                                  additional_address_info:
                                    description: Additional information about the
                                      address, such as a building name, floor, or
                                      department name.
                                    example: オフィスビル3階
                                    type: string
                                    x-description-i18n:
                                      jpn: 建物名・部屋番号などの住所に関する追加情報
                                  city:
                                    description: City, district, suburb, town, or
                                      village.
                                    example: 渋谷区
                                    type: string
                                    x-description-i18n:
                                      jpn: 住所の市区町村
                                  country:
                                    description: Country of the address using ISO
                                      3166-1 alpha-2 code.
                                    example: JP
                                    pattern: ^[A-Z]{2}$
                                    type: string
                                    x-description-i18n:
                                      jpn: 住所の国を ISO 3166-1 alpha-2 コードで指定します。
                                  postal_code:
                                    description: ZIP or postal code.
                                    example: 123-4567
                                    type: string
                                    x-description-i18n:
                                      jpn: 郵便番号
                                  state:
                                    description: State name or abbreviation.
                                    example: 東京都
                                    type: string
                                    x-description-i18n:
                                      jpn: 住所の都道府県または州
                                  street:
                                    description: Street address, apartment or suite
                                      number.
                                    example: 神宮前1-1-1
                                    type: string
                                    x-description-i18n:
                                      jpn: 住所の通りの名前や番地を含めた部分
                                required:
                                - street
                                - city
                                - state
                                - country
                                - postal_code
                                title: Tenant Billing Address
                                x-title-i18n:
                                  jpn: テナントの請求先住所
                              invoice_language:
                                description: Language of invoice
                                enum:
                                - ja-JP
                                - en-US
                                type: string
                                x-description-i18n:
                                  jpn: 請求書の言語
                              name:
                                description: Tenant name for billing
                                example: 株式会社テストテナント
                                type: string
                                x-description-i18n:
                                  jpn: 請求用のテナント名
                            required:
                            - name
                            - address
