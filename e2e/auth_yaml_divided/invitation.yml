                required:
                - type
                - message
          description: Internal Server Error
      summary: Get Tenant Invitations
      tags:
      - invitation
      x-description-i18n:
        jpn: |
          テナントへの招待一覧を取得します。
      x-summary-i18n:
        jpn: テナントの招待一覧を取得
