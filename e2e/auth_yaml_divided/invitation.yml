                  status:
                    enum:
                    - pending
                    - accepted
                    - expired
                    title: Invitation Status
                    type: string
                    x-title-i18n:
                      jpn: 招待ステータス
                required:
                - id
                - email
                - invitation_url
                - envs
                - expired_at
                - status
                title: Invitation
                type: object
                x-title-i18n:
