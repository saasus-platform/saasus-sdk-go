                          items:
                            description: role info
                            properties:
                              display_name:
                                description: role display name
                                example: 管理者
                                type: string
                                x-description-i18n:
                                  jpn: 役割(ロール)表示名
                              role_name:
                                description: role name
                                example: admin
                                type: string
                                x-description-i18n:
                                  jpn: 役割(ロール)名
                            required:
                            - role_name
                            - display_name
                            title: Role
                            type: object
                            x-description-i18n:
                              jpn: 役割(ロール)情報
                            x-title-i18n:
                              jpn: 役割(ロール)
                          type: array
                          x-description-i18n:
                            jpn: 役割(ロール)情報
                      required:
                      - id
                      - name
                      - roles
                      type: object
                    type: array
                  expired_at:
                    description: Expiration date of the invitation
                    example: 1640995200
                    title: Expiration Date
                    type: integer
                    x-description-i18n:
                      jpn: 招待の有効期限
                    x-title-i18n:
                      jpn: 有効期限
                  id:
                    example: 69e732d6-8ecc-45c4-c2eb-8438f7ffe775
