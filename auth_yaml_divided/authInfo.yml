                    minimum_length:
                      description: Minimum number of characters
                      example: 10
                      type: integer
                      x-description-i18n:
                        jpn: 最小文字数
                      x-go-type: uint64
                    temporary_password_validity_days:
                      description: Temporary password expiration date
                      example: 10
                      type: integer
                      x-description-i18n:
                        jpn: 仮パスワードの有効期限
                      x-go-type: uint64
                  required:
                  - minimum_length
                  - is_require_lowercase
                  - is_require_numbers
                  - is_require_symbols
                  - is_require_uppercase
                  - temporary_password_validity_days
                  type: object
                  x-description-i18n:
                    jpn: パスワードポリシー
                recaptcha_props:
                  description: |
                    reCAPTCHA authentication settings
                    ※ This function is not yet provided, so it cannot be changed or saved.
                  properties:
                    secret_key:
                      description: secret key
                      example: d5794b1b-5f92-4dc6-aa48-085dbb08b813
                      type: string
                      x-description-i18n:
                        jpn: シークレットキー
                    site_key:
                      description: site key
                      example: ede66c43-9b9d-4222-93ed-5f11c96e08e2
                      type: string
                      x-description-i18n:
                        jpn: サイトキー
                  required:
                  - site_key
                  - secret_key
                  type: object
                  x-description-i18n:
                    jpn: |
                      reCAPTCHA認証設定
                      ※ 未提供の機能のため、変更・保存はできません。
                self_regist:
                  description: self sign-up permission
                  properties:
                    enable:
                      example: true
                      type: boolean
                  required:
