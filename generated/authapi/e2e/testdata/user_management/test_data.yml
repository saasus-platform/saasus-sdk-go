# ユーザー管理ストーリーのテストデータ

user_attributes:
  list:
    test_cases:
      - name: "ユーザー属性一覧取得"
        description: "既存のユーザー属性定義の一覧を取得"
        method: "GET"
        endpoint: "/user-attributes"
        expected:
          status_code: 200

  create:
    test_cases:
      - name: "ユーザー属性作成"
        description: "新しいユーザー属性定義を作成"
        method: "POST"
        endpoint: "/user-attributes"
        expected:
          status_code: 201
      - name: "重複ユーザー属性作成エラー"
        description: "既存の属性名で作成を試行してエラーを確認"
        method: "POST"
        endpoint: "/user-attributes"
        expected:
          status_code: 400
    params:
      - attribute_name: "birthday"
        display_name: "誕生日"
      - attribute_name: "address"
        display_name: "住所"
      - attribute_name: "phone_number"
        display_name: "電話番号"

  delete:
    test_cases:
      - name: "ユーザー属性削除"
        description: "不要なユーザー属性定義を削除"
        method: "DELETE"
        endpoint: "/user-attributes/{attribute_name}"
        expected:
          status_code: 200
      - name: "存在しないユーザー属性削除エラー"
        description: "存在しない属性名で削除を試行してエラーを確認"
        method: "DELETE"
        endpoint: "/user-attributes/{attribute_name}"
        expected:
          status_code: 404

saas_users:
  list:
    test_cases:
      - name: "SaaSユーザー一覧取得"
        description: "全SaaSユーザーの一覧を取得"
        method: "GET"
        endpoint: "/users"
        expected:
          status_code: 200

  create:
    test_cases:
      - name: "SaaSユーザー作成"
        description: "管理者による新しいSaaSユーザーの作成"
        method: "POST"
        endpoint: "/users"
        expected:
          status_code: 201
      - name: "重複メールアドレスエラー"
        description: "既存のメールアドレスでユーザー作成を試行してエラーを確認"
        method: "POST"
        endpoint: "/users"
        expected:
          status_code: 400
    params:
      - email: "test-user-1@example.com"
        attributes:
          birthday: "19900101"
          address: "東京都渋谷区"
      - email: "test-user-2@example.com"
        attributes:
          birthday: "19950315"
          address: "大阪府大阪市"

  get:
    test_cases:
      - name: "SaaSユーザー詳細取得"
        description: "特定ユーザーの詳細情報を取得"
        method: "GET"
        endpoint: "/users/{user_id}"
        expected:
          status_code: 200
      - name: "存在しないユーザー取得エラー"
        description: "存在しないユーザーIDで取得を試行してエラーを確認"
        method: "GET"
        endpoint: "/users/{user_id}"
        expected:
          status_code: 404

  update:
    test_cases:
      - name: "ユーザー属性更新"
        description: "ユーザーの追加属性情報を更新"
        method: "PATCH"
        endpoint: "/users/{user_id}/attributes"
        expected:
          status_code: 200
      - name: "存在しないユーザー属性更新エラー"
        description: "存在しないユーザーIDで属性更新を試行してエラーを確認"
        method: "PATCH"
        endpoint: "/users/{user_id}/attributes"
        expected:
          status_code: 404
    params:
      attributes:
        birthday: "19920520"
        address: "神奈川県横浜市"
        phone_number: "090-1234-5678"

  delete:
    test_cases:
      - name: "SaaSユーザー削除"
        description: "ユーザーの完全削除"
        method: "DELETE"
        endpoint: "/users/{user_id}"
        expected:
          status_code: 200
      - name: "存在しないユーザー削除エラー"
        description: "存在しないユーザーIDで削除を試行してエラーを確認"
        method: "DELETE"
        endpoint: "/users/{user_id}"
        expected:
          status_code: 404

user_info:
  update_email:
    test_cases:
      - name: "メールアドレス変更"
        description: "ユーザーのメールアドレスを変更"
        method: "PATCH"
        endpoint: "/users/{user_id}/email"
        expected:
          status_code: 200
      - name: "無効なメールアドレス変更エラー"
        description: "無効なメールアドレス形式で変更を試行してエラーを確認"
        method: "PATCH"
        endpoint: "/users/{user_id}/email"
        expected:
          status_code: 400
    params:
      email: "updated-user@example.com"

  update_password:
    test_cases:
      - name: "パスワード変更"
        description: "ユーザーのログインパスワードを変更"
        method: "PATCH"
        endpoint: "/users/{user_id}/password"
        expected:
          status_code: 200
      - name: "弱いパスワード変更エラー"
        description: "弱いパスワードで変更を試行してエラーを確認"
        method: "PATCH"
        endpoint: "/users/{user_id}/password"
        expected:
          status_code: 400
    params:
      password: "NewSecurePassword123!"

# テスト用データ
test_user_emails:
  - "test-user-1@example.com"
  - "test-user-2@example.com"
  - "test-user-3@example.com"

test_attribute_names:
  - "birthday"
  - "address"
  - "phone_number"

invalid_user_ids:
  - "invalid-user-id"
  - "00000000-0000-0000-0000-000000000000"
  - "not-a-uuid"

invalid_attribute_names:
  - "non_existent_attribute"
  - "invalid-attribute"
  - ""