# テナントユーザー管理ストーリーのテストデータ

tenant_users:
  list:
    test_cases:
      - name: "テナントユーザー一覧取得"
        description: "特定テナントのユーザー一覧を取得"
        method: "GET"
        endpoint: "/tenants/{tenant_id}/users"
        expected:
          status_code: 200

  create:
    test_cases:
      - name: "テナントユーザー作成"
        description: "既存ユーザーをテナントに追加"
        method: "POST"
        endpoint: "/tenants/{tenant_id}/users"
        expected:
          status_code: 201
      - name: "重複テナントユーザー作成エラー"
        description: "既にテナントに所属するユーザーを追加してエラーを確認"
        method: "POST"
        endpoint: "/tenants/{tenant_id}/users"
        expected:
          status_code: 400
    params:
      - user_id: "test-user-1"
        roles: ["admin", "user"]
        envs: ["dev", "prod"]
      - user_id: "test-user-2"
        roles: ["user"]
        envs: ["dev"]

  get:
    test_cases:
      - name: "テナントユーザー詳細取得"
        description: "特定テナントユーザーの詳細情報を取得"
        method: "GET"
        endpoint: "/tenants/{tenant_id}/users/{user_id}"
        expected:
          status_code: 200
      - name: "存在しないテナントユーザー取得エラー"
        description: "存在しないユーザーIDで取得を試行してエラーを確認"
        method: "GET"
        endpoint: "/tenants/{tenant_id}/users/{user_id}"
        expected:
          status_code: 404

  update:
    test_cases:
      - name: "テナントユーザー情報更新"
        description: "テナントユーザーの役割や環境を更新"
        method: "PATCH"
        endpoint: "/tenants/{tenant_id}/users/{user_id}"
        expected:
          status_code: 200
      - name: "存在しないテナントユーザー更新エラー"
        description: "存在しないユーザーIDで更新を試行してエラーを確認"
        method: "PATCH"
        endpoint: "/tenants/{tenant_id}/users/{user_id}"
        expected:
          status_code: 404
    params:
      roles: ["admin", "manager"]
      envs: ["dev", "staging", "prod"]

  delete:
    test_cases:
      - name: "テナントユーザー削除"
        description: "テナントからユーザーを削除"
        method: "DELETE"
        endpoint: "/tenants/{tenant_id}/users/{user_id}"
        expected:
          status_code: 200
      - name: "存在しないテナントユーザー削除エラー"
        description: "存在しないユーザーIDで削除を試行してエラーを確認"
        method: "DELETE"
        endpoint: "/tenants/{tenant_id}/users/{user_id}"
        expected:
          status_code: 404

all_tenant_users:
  list:
    test_cases:
      - name: "全テナントユーザー一覧取得"
        description: "全テナントのユーザー一覧を取得"
        method: "GET"
        endpoint: "/tenant-users"
        expected:
          status_code: 200

  create:
    test_cases:
      - name: "全テナントユーザー作成"
        description: "新しいユーザーを作成して全テナントに追加"
        method: "POST"
        endpoint: "/tenant-users"
        expected:
          status_code: 201
      - name: "重複メールアドレスエラー"
        description: "既存のメールアドレスでユーザー作成を試行してエラーを確認"
        method: "POST"
        endpoint: "/tenant-users"
        expected:
          status_code: 400
    params:
      - email: "tenant-user-1@example.com"
        attributes:
          department: "開発部"
          position: "エンジニア"
        roles: ["user"]
        envs: ["dev"]
      - email: "tenant-user-2@example.com"
        attributes:
          department: "営業部"
          position: "マネージャー"
        roles: ["admin"]
        envs: ["prod"]

  get:
    test_cases:
      - name: "全テナントユーザー詳細取得"
        description: "特定ユーザーの全テナント情報を取得"
        method: "GET"
        endpoint: "/tenant-users/{user_id}"
        expected:
          status_code: 200
      - name: "存在しないユーザー取得エラー"
        description: "存在しないユーザーIDで取得を試行してエラーを確認"
        method: "GET"
        endpoint: "/tenant-users/{user_id}"
        expected:
          status_code: 404

  update:
    test_cases:
      - name: "全テナントユーザー属性更新"
        description: "ユーザーの属性情報を更新"
        method: "PATCH"
        endpoint: "/tenant-users/{user_id}/attributes"
        expected:
          status_code: 200
      - name: "存在しないユーザー属性更新エラー"
        description: "存在しないユーザーIDで属性更新を試行してエラーを確認"
        method: "PATCH"
        endpoint: "/tenant-users/{user_id}/attributes"
        expected:
          status_code: 404
    params:
      attributes:
        department: "技術部"
        position: "シニアエンジニア"
        team: "バックエンド"

  delete:
    test_cases:
      - name: "全テナントユーザー削除"
        description: "ユーザーを全テナントから削除"
        method: "DELETE"
        endpoint: "/tenant-users/{user_id}"
        expected:
          status_code: 200
      - name: "存在しないユーザー削除エラー"
        description: "存在しないユーザーIDで削除を試行してエラーを確認"
        method: "DELETE"
        endpoint: "/tenant-users/{user_id}"
        expected:
          status_code: 404

role_management:
  attach_role:
    test_cases:
      - name: "役割付与"
        description: "テナントユーザーに環境毎の役割を付与"
        method: "POST"
        endpoint: "/tenants/{tenant_id}/users/{user_id}/envs/{env_id}/roles/{role_name}"
        expected:
          status_code: 200
      - name: "重複役割付与エラー"
        description: "既に付与されている役割を再度付与してエラーを確認"
        method: "POST"
        endpoint: "/tenants/{tenant_id}/users/{user_id}/envs/{env_id}/roles/{role_name}"
        expected:
          status_code: 400
    params:
      env_id: "dev"
      role_name: "admin"

  detach_role:
    test_cases:
      - name: "役割削除"
        description: "テナントユーザーから環境毎の役割を削除"
        method: "DELETE"
        endpoint: "/tenants/{tenant_id}/users/{user_id}/envs/{env_id}/roles/{role_name}"
        expected:
          status_code: 200
      - name: "存在しない役割削除エラー"
        description: "付与されていない役割を削除してエラーを確認"
        method: "DELETE"
        endpoint: "/tenants/{tenant_id}/users/{user_id}/envs/{env_id}/roles/{role_name}"
        expected:
          status_code: 404
    params:
      env_id: "dev"
      role_name: "admin"

