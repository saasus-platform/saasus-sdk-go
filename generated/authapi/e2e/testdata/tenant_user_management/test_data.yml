test_user_emails:
  - "tenant-user-1@example.com"
  - "tenant-user-2@example.com"
  - "tenant-user-3@example.com"

test_tenant_ids:
  - "test-tenant-1"
  - "test-tenant-2"

test_env_ids:
  - "dev"
  - "staging"
  - "prod"

test_role_names:
  - "admin"
  - "user"
  - "manager"
  - "viewer"

invalid_user_ids:
