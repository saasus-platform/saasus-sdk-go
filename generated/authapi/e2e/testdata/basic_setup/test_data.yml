# テスト用リソースID
test_env_ids:
  - "123"
  - "124"
  - "125"

invalid_env_ids:
  - "999999"
  - "888888"
  - "0"

# セットアップ設定
setup:
  timeout: "30s"
  retry_count: 3
  cleanup_on_failure: true

# クリーンアップ設定
cleanup:
  delete_test_envs: true
  restore_original_settings: true
  timeout: "60s"